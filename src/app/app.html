@if (showGlobalNav()) {
  <nav class="nav">
    <div class="nav__logo" style="cursor: pointer;" routerLink="/">LienUrbain<span>.</span></div>

    <div class="nav__spacer"></div>

    <ul class="nav__links">
      @if (showFeedLink()) {
        <li><a routerLink="/app/feed">Le Fil</a></li>
      }

      <li><a routerLink="/app/dashboard">Mon Kanban</a></li>

      @if (currentUser(); as user) {
        <li>
          <button class="nav-user" [routerLink]="['/app/profile']">
            <img [src]="user.photoProfil" [alt]="user.prenom" class="avatar avatar--sm">
            <span class="nav-user__name">{{ user.prenom }}</span>
          </button>
        </li>
      }

      @if (isAdmin()) {
        <li>
          <a routerLink="/app/admin" style="color: var(--accent); font-weight: 600;">
            <i class="ri-shield-user-fill"></i> Admin
          </a>
        </li>
      }

      @if (currentUser()) {
        <li>
          <button class="btn-primary btn-primary--ghost" (click)="logout()">Déconnexion</button>
        </li>
      }
    </ul>
  </nav>
}

<div class="page-wrapper">
  <router-outlet></router-outlet>
</div>
