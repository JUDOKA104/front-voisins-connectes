<nav class="nav" *ngIf="showGlobalNav">
  <div class="nav__logo" style="cursor: pointer;" routerLink="/">LienUrbain<span>.</span></div>

  <div class="nav__spacer"></div>

  <ul class="nav__links">
    <li *ngIf="!currentUrl.includes('/app/feed')">
      <a routerLink="/app/feed">Le Fil</a>
    </li>

    <li><a routerLink="/app/dashboard">Mon Kanban</a></li>

    <li *ngIf="currentUser">
      <button class="nav-user" [routerLink]="['/app/profile']">
        <img [src]="currentUser?.photoProfil" [alt]="currentUser?.prenom" class="avatar avatar--sm">
        <span class="nav-user__name">{{ currentUser?.prenom }}</span>
      </button>
    </li>

    <li *ngIf="isAdmin">
      <a routerLink="/app/admin" style="color: var(--accent); font-weight: 600;">
        <i class="ri-shield-user-fill"></i> Admin
      </a>
    </li>

    <li *ngIf="currentUser">
      <button class="btn-primary btn-primary--ghost" (click)="logout()">Déconnexion</button>
    </li>
  </ul>
</nav>

<div class="page-wrapper">
  <router-outlet></router-outlet>
</div>
