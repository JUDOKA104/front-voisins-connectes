<div class="auth-layout">

  <div class="auth-image">
    <blockquote>"L'entraide est le pilier d'un quartier vivant."</blockquote>
    <div class="auth-brand">LienUrbain<span>.</span></div>
  </div>

  <div class="auth-form-container">
    <a routerLink="/" class="back-link"><i class="ri-arrow-left-line"></i> Retour au site</a>

    <div class="auth-content">
      <h1>Content de vous revoir.</h1>
      <p style="color: var(--ink-60); margin-bottom: var(--sp-10); font-size: var(--text-lg);">Connectez-vous pour voir les demandes de vos voisins.</p>

      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Adresse e-mail</label>
          <input type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" placeholder="jean.dupont@exemple.com">
        </div>

        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" placeholder="••••••••">
        </div>

        @if (errorMessage()) {
          <div style="color: var(--accent); margin-bottom: 1rem; text-align: center; font-weight: 500;">
            {{ errorMessage() }}
          </div>
        }

        <button type="submit" class="btn-primary btn-primary--accent w-full" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            Connexion en cours...
          } @else {
            Se connecter <i class="ri-login-circle-line"></i>
          }
        </button>
      </form>

      <p class="auth-switch">Vous n'avez pas de compte ? <a routerLink="/register">S'inscrire</a></p>
    </div>
  </div>
</div>
